<!DOCTYPE html>
<html>
  <head>
    <title>Center</title>
  </head>
  <body>

<div style="text-align: center;">
      <div style="width: 500px; margin: 0 auto; background: #000; color: #fff;">The Title of the stuff I"m making</div>
  <style>
ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
}
</style>
</head>
<body>

<h2>Basic CSS for Navbar</h2>

<p>We remove the bullet points from the list, and resets its default padding and margin.</p>

<ul>
  <li><a href="#home">Home</a></li>
  <li><a href="#news">News</a></li>
  <li><a href="#contact">Contact</a></li>
  <li><a href="#about">About</a></li>
</ul>
<nav>
  <ul>
    <li><a href="/">Home</a></li>
    <li><a href="/about">About</a></li>
    <li><a href="/contact">Contact</a></li>
  </ul>
</nav>

    </div>
    <div align="center"
      <p><em>This is in italics</em></p>
      <p><i>This conveys emphasis</i></p>
      <p><b>STRONG TEXT</b></p>
    </div>

  </body>
</html>
